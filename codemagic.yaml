workflows:
  ios-workflow:
    name: AT YARIŞI PRO iOS
    instance_type: mac_mini_m1
    environment:
      vars:
        APP_NAME: "AT YARIŞI PRO"
        BUNDLE_ID: "com.odpexpress.jokeyiz"
        VERSION: "1.0.0"
        BUILD_NUMBER: "1"
      flutter: stable
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Set version and build number
        script: |
          # Update version in Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" ios/Runner/Info.plist
          
          # Update display name
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName $APP_NAME" ios/Runner/Info.plist
      
      - name: Get packages
        script: flutter packages pub get
      
      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign
          cd build/ios/iphoneos
          mkdir -p Payload
          mv Runner.app Payload/
          zip -r "$APP_NAME.ipa" Payload/
    artifacts:
      - build/ios/iphoneos/*.ipa
    publishing:
      email:
        recipients:
          - odpexpress@gmail.com